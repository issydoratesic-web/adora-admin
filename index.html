<!-- Primjer koda koji klijentica koristi na svom mobitelu za skeniranje -->
<div id="app">
    <h2>Moja Adora Kartica</h2>
    <div class="stamp-container">
        <!-- Prikaz skupljenih štambilja -->
        <div class="stamps-grid" id="stampsGrid"></div>
    </div>
    
    <!-- Gumb koji otvara kameru unutar aplikacije -->
    <button id="scanBtn">✨ Skeniraj za štambilj ✨</button>
    <video id="cameraPreview" style="display:none; width: 100%; max-width: 300px;"></video>
</div>

<script src="https://unpkg.com/@html5-qrcode/html5-qrcode"></script>
<script>
    const scanBtn = document.getElementById('scanBtn');
    const preview = document.getElementById('cameraPreview');

    scanBtn.addEventListener('click', () => {
        preview.style.display = 'block';
        const html5QrCode = new Html5Qrcode("cameraPreview");
        
        html5QrCode.start(
            { facingMode: "environment" }, // Koristi stražnju kameru
            { fps: 10, qrbox: 250 },
            (qrCodeText) => {
                // Kada uspješno skenira QR kod sa tvog pulta
                html5QrCode.stop();
                preview.style.display = 'none';
                
                // Šaljemo tajni token na naš server da potvrdimo dolazak
                posaljiStampiljNaServer(qrCodeText);
            },
            (errorMessage) => { /* stalno skenira dok ne nađe kod */ }
        );
    });

    function posaljiStampiljNaServer(kod) {
        // Pozivamo backend koji provjerava poklapa li se kod sa "ADORA-TAJNA-LOZINKA-2026"
        fetch('/api/dodaj-stampilj', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: kod, userId: 'trenutni_korisnik_id' })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert('Čestitamo! Dobili ste novi štambilj! 🎉');
                osvjeziKarticu();
            } else {
                alert('Greška: ' + data.message);
            }
        });
    }
</script>
